<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Meu Primeiro Mondrian - Tabela Simples</title>
        <style>
            table {
                border: 1px;
            }

            /* Configuração de todas as Células (Blocos) */
            td {
                border: 1px;
            }

            /* Paleta de Cores de Mondrian */
            .bloco-vermelho {
                background-color: #E22B24;
            }

            .bloco-amarelo {
                background-color: #F8D02E;
            }

            .bloco-azul {
                background-color: #01519C;
            }

            .bloco-branco {
                background-color: #FAFAFA;
            }

            .bloco-preto {
                background-color: #1A1A1A;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <td class="bloco-vermelho">vermelho</td>
                <td class="bloco-branco">branco</td>
                <td class="bloco-amarelo">amarelo</td>
            </tr>
            
            <tr>
                <td class="bloco-azul">azul</td>
                <td class="bloco-preto">preto</td>
                <td class="bloco-branco">branco</td>
            </tr>
        </table>
    </body>
</html>
