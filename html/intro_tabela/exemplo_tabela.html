<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Primeiro Mondrian - Tabela Simples</title>
    <style>
        table {
            width: 600px;               /* Largura total da obra de arte */
            height: 400px;              /* Altura total da obra de arte */
            border-collapse: collapse;  /* Une as bordas para parecer uma linha única */
            margin: 50px auto;          /* Centraliza a tabela na tela */
            border: 10px solid #000000; /* Moldura preta grossa externa */
        }

        /* Configuração de todas as Células (Blocos) */
        td {
            border: 8px solid #000000;  /* Linhas pretas internas que dividem os blocos */
            width: 33.33%;              /* Distribui igualmente as 3 colunas (opcional) */
        }

        /* Paleta de Cores de Mondrian */
        .bloco-vermelho {
            background-color: #E22B24;
        }

        .bloco-amarelo {
            background-color: #F8D02E;
        }

        .bloco-azul {
            background-color: #01519C;
        }

        .bloco-branco {
            background-color: #FAFAFA;
        }

        .bloco-preto {
            background-color: #1A1A1A;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td class="bloco-vermelho"></td>
            <td class="bloco-branco"></td>
            <td class="bloco-amarelo"></td>
        </tr>
        
        <tr>
            <td class="bloco-azul"></td>
            <td class="bloco-preto"></td>
            <td class="bloco-branco"></td>
        </tr>
    </table>
</body>
