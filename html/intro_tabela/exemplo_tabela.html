<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Meu Primeiro Mondrian - Tabela Simples</title>
        <style>
            table {
                border: 2px solid #000000; /* Moldura preta grossa externa */
            }

            /* Configuração de todas as Células (Blocos) */
            td {
                border: 2px solid #000000;  /* Linhas pretas internas que dividem os blocos */
            }

            /* Paleta de Cores de Mondrian */
            .bloco-vermelho {
                background-color: #E22B24;
            }

            .bloco-amarelo {
                background-color: #F8D02E;
            }

            .bloco-azul {
                background-color: #01519C;
            }

            .bloco-branco {
                background-color: #FAFAFA;
            }

            .bloco-preto {
                background-color: #1A1A1A;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <td class="bloco-vermelho">&lt;td&gt;&lt;/td&gt;</td>
                <td class="bloco-branco">&lt;td&gt;&lt;/td&gt;</td>
                <td class="bloco-amarelo">&lt;td&gt;&lt;/td&gt;</td>
            </tr>
            
            <tr>
                <td class="bloco-azul">&lt;td&gt;&lt;/td&gt;</td>
                <td class="bloco-preto">&lt;td&gt;&lt;/td&gt;</td>
                <td class="bloco-branco">&lt;td&gt;&lt;/td&gt;</td>
            </tr>
        </table>
    </body>
</html>
